services:
  vivarium:
    build:
      context: .
      args:
        UID: "${HOST_UID:-1000}"
        GID: "${HOST_GID:-1000}"
        INSTALL_OPENCODE: "${INSTALL_OPENCODE:-true}"
        INSTALL_CLAUDE: "${INSTALL_CLAUDE:-false}"
        INSTALL_BESTIARY: "${INSTALL_BESTIARY:-false}"
        BESTIARY_REF: "${BESTIARY_REF:-main}"
    image: vivarium:latest
    container_name: vivarium

    # the whole home lives on the host so auth/creds/code survive rebuilds
    volumes:
      - ${VIVARIUM_HOME:-${HOME}/vivarium-home}:/home/vivarium

    working_dir: /home/vivarium/work

    # Remote-access mode: when set, the entrypoint runs `opencode web` instead
    # of `sleep infinity`. HTTP Basic auth (user "opencode", this password)
    # gates the listener. Empty = disabled = no listener, no auth required.
    environment:
      OPENCODE_SERVER_PASSWORD: "${OPENCODE_SERVER_PASSWORD:-}"

    # Port mapping is bound to the host's headscale interface (100.64.0.1) only,
    # NOT 0.0.0.0 — so LAN/WAN cannot reach the container directly. Only traffic
    # arriving via headscale (e.g. from the Hetzner Caddy reverse proxy) hits it.
    # Requires tailscale to be up on the host. Disable by leaving
    # OPENCODE_SERVER_PASSWORD unset (the listener won't start; the bind is
    # harmless but you can comment this out if you want zero exposure).
    ports:
      - "${OPENCODE_BIND_ADDR:-100.64.0.1}:4096:4096"

    # baseline hardening — no capabilities beyond what a shell needs
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETUID", "SETGID"]
    security_opt:
      - no-new-privileges:true

    # resource limits — a runaway loop won't eat the host
    mem_limit: 4g
    cpus: 2.0
    pids_limit: 512

    # restart policy — autopilot friendly, survives host reboots.
    # change to "no" if you'd rather start manually.
    restart: unless-stopped

    # long-running service; shell in with `docker compose exec vivarium bash`
    stdin_open: true
    tty: true

    # DNS — tighten later if you want domain-level filtering
    # dns:
    #   - 1.1.1.1
