services:
  vivarium:
    build:
      context: .
      args:
        UID: "${HOST_UID:-1000}"
        GID: "${HOST_GID:-1000}"
        INSTALL_OPENCODE: "${INSTALL_OPENCODE:-true}"
        INSTALL_CLAUDE: "${INSTALL_CLAUDE:-false}"
        INSTALL_PASEO: "${INSTALL_PASEO:-false}"
        INSTALL_BESTIARY: "${INSTALL_BESTIARY:-false}"
        BESTIARY_REF: "${BESTIARY_REF:-main}"
    image: vivarium:latest
    container_name: vivarium

    # the whole home lives on the host so auth/creds/code survive rebuilds
    volumes:
      - ${VIVARIUM_HOME:-${HOME}/vivarium-home}:/home/vivarium

    working_dir: /home/vivarium/work

    # Remote-access mode — at most one listener at a time.
    #   PASEO_ENABLE=true              -> entrypoint runs `paseo daemon start
    #                                     --foreground --no-relay` on :6767,
    #                                     paired by QR (no password).
    #   OPENCODE_SERVER_PASSWORD set   -> entrypoint runs `opencode web` on
    #                                     :4096, gated by HTTP Basic auth.
    #   neither                        -> sleep infinity (shell-in only).
    # Paseo wins if both are set (it's a multi-agent superset of opencode-web).
    # PASEO_HOSTNAMES is paseo's Host-header allowlist; entrypoint defaults it
    # to "true" (any host) since the network gate is the actual auth surface.
    environment:
      OPENCODE_SERVER_PASSWORD: "${OPENCODE_SERVER_PASSWORD:-}"
      PASEO_ENABLE: "${PASEO_ENABLE:-}"
      PASEO_HOSTNAMES: "${PASEO_HOSTNAMES:-}"

    # Port mappings default to 127.0.0.1. Bind directly to a tailscale IP
    # (e.g. PASEO_BIND_ADDR=100.64.0.3) on a rootful Docker daemon to expose
    # the listener tailnet-only, no host-side forwarder needed. On Docker
    # Desktop the daemon runs in a VM and cannot bind host-specific IPs;
    # use scripts/forwarder-install.sh for that case (opencode pattern).
    ports:
      - "${OPENCODE_BIND_ADDR:-127.0.0.1}:4096:4096"
      - "${PASEO_BIND_ADDR:-127.0.0.1}:6767:6767"

    # baseline hardening — no capabilities beyond what a shell needs
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETUID", "SETGID"]
    security_opt:
      - no-new-privileges:true

    # resource limits — a runaway loop won't eat the host
    mem_limit: 4g
    cpus: 2.0
    pids_limit: 512

    # restart policy — autopilot friendly, survives host reboots.
    # change to "no" if you'd rather start manually.
    restart: unless-stopped

    # long-running service; shell in with `docker compose exec vivarium bash`
    stdin_open: true
    tty: true

    # DNS — tighten later if you want domain-level filtering
    # dns:
    #   - 1.1.1.1
